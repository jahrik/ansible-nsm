---
# Thin wrapper: this repository is itself the ansible-nsm role
# (Galaxy-installable at the repo root). Including it by directory keeps
# `ansible-playbook playbook.yml` working without requiring the repo to be
# checked out under a roles/ path.
- name: Deploy Network Security Monitoring stack
  hosts: all
  become: true
  vars:
    ansible_user: "{{ lookup('env', 'USER') }}"
  vars_files:
    - "secrets/{{ inventory_hostname }}.yml"
  tasks:
    - name: Include the nsm role
      ansible.builtin.include_role:
        name: "{{ playbook_dir }}"
