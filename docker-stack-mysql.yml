version: '3'

services:

  mysql:
    image: mysql:latest
    # MYSQL_ROOT_PASSWORD and MYSQL_PASSWORD must be supplied via the
    # environment (e.g. an untracked .env file or your secrets manager).
    # There is no default: deploy fails fast if they are unset. Never
    # hardcode a real password in this file.
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      - MYSQL_DATABASE=snort
      - MYSQL_USER=snort
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
    volumes:
      - /var/lib/mysql:/var/lib/mysql/
      - /etc/mysql/conf.d:/etc/mysql/conf.d
    ports:
      - 3306:3306
